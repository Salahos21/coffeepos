name: pos_prototype_0
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.2.1
  fl_chart: ^1.2.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  mailer: ^7.1.0
  share_plus: 12.0.1
  intl: ^0.20.2
  file_picker: ^10.3.10
  supabase_flutter: ^2.0.0
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^7.1.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # NEW: Packages for Icons and Splash Screens
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

# CONFIGURATION FOR APP ICON
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

# CONFIGURATION FOR SPLASH SCREEN
flutter_native_splash:
  color: "#006E3B"
  image: "assets/icons/splash_logo.png"
  android_12:
    image: "assets/icons/splash_logo.png"
    color: "#006E3B"

flutter:
  uses-material-design: true
  # Ensure you uncomment/add an assets section if you haven't!
  assets:
    - assets/icons/
